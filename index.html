<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="assets/index.css" />
  </head>
  <body>
    <div class="container">
      <div class="music-player">
        <div class="currentplaying-container">
          <div class="current-music"></div>
          <div class="music-icons">
            <button><img src="assets/icons/left.svg" alt="left-arrow"></button>
            <button><img src="assets/icons/play.svg" alt="play-button"></button>
            <button><img src="assets/icons/pause.svg" alt="pause-button"></button>
            <button><img src="assets/icons/right.svg" alt="right-arrow"></button>
          </div>
        </div>
        <div class="playlist-container">
          <div class="playlist"></div>
        </div>
      </div>
    </div>
  </body>
</html>
