<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <title>Music Player</title>
  </head>
  <body>
    <div class="container">
      <div class="music-player">
        <div class="currentplaying-container">
          <div class="current-music">
            <p class="musicname">Music Title</p>
            <p class="artistname">Artist Name</p>
          </div>
          <div class="music-icons">
            <button class="previous"><i class="bi bi-skip-start"></i></button>
            <button class="play"><i class="bi bi-play"></i></button>
            <button class="pause"><i class="bi bi-pause"></i></button>
            <button class="next"><i class="bi bi-skip-end"></i></button>
          </div>
        </div>
        <div class="playlist-container">
          <div class="playlist">
            <ul class="all-songs">
                <li id="0">
                    <button class="music">
                        <span class="music-name">Egwu</span> <span class="artist">Chike</span> <span class="duration">2:16</span>
                        <audio src="music1.mp3"></audio>
                    </button>
                </li>
                <li id="1">
                    <button class="music">
                        <span class="music-name">Someone You Loved</span> <span class="artist">Conor Maynard</span> <span class="duration">2:24</span>
                        <audio src="music2.mp3"></audio>
                    </button>
                </li>
                <li id="2">
                    <button class="music">
                        <span class="music-name">My Baby</span> <span class="artist">Diamond Platnumz</span> <span class="duration">3:32</span>
                        <audio src="music3.mp3"></audio>
                    </button>
                </li>
                <li id="3">
                    <button class="music">
                        <span class="music-name">Life For Rent</span> <span class="artist">Don Moen</span> <span class="duration">3:47</span>
                        <audio src="music4.mp3"></audio>
                    </button>
                </li>
                <li id="4">
                    <button class="music">
                        <span class="music-name">I Will Sing</span> <span class="artist">Ed Sheeran</span> <span class="duration">3:47</span>
                        <audio src="music5.mp3"></audio>
                    </button>
                </li>
                <li id="5">
                    <button class="music">
                        <span class="music-name">Salt Water</span> <span class="artist">Mccoy</span> <span class="duration">3:59</span>
                        <audio src="music6.mp3"></audio>
                    </button>
                </li>

            </ul>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/index.js"></script>
  </body>
</html>
