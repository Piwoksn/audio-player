<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <title>Music Player</title>
  </head>
  <body>
    <div class="container">
      <div class="music-player">
        <div class="currentplaying-container">
          <div class="current-music"></div>
          <div class="music-icons">
            <button><i class="bi bi-skip-start"></i></button>
            <button><i class="bi bi-play"></i></button>
            <button><i class="bi bi-pause"></i></button>
            <button><i class="bi bi-skip-end"></i></button>
          </div>
        </div>
        <div class="playlist-container">
          <div class="playlist"></div>
        </div>
      </div>
    </div>
  </body>
</html>
